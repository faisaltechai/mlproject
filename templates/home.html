<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --board:#1e3b2c;
            --board-dark:#17301f;
            --chalk:#f2efe6;
            --chalk-dim:#c9d1c4;
            --chalk-yellow:#e8c468;
            --wood:#5b3a26;
            --wood-dark:#432a1b;
        }

        *{ box-sizing:border-box; }

        @media (prefers-reduced-motion: reduce){
            *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
        }

        body{
            margin:0;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:40px 20px;
            font-family:'Space Grotesk', Arial, sans-serif;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(255,255,255,0.03), transparent 60%),
                linear-gradient(var(--wood), var(--wood-dark));
        }

        .frame{
            width:100%;
            max-width:640px;
            padding:14px;
            background:linear-gradient(160deg, var(--wood) 0%, var(--wood-dark) 100%);
            border-radius:16px;
            box-shadow:
                0 25px 50px -12px rgba(0,0,0,0.55),
                inset 0 0 0 1px rgba(255,255,255,0.06);
        }

        .board{
            position:relative;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.05), transparent 55%),
                var(--board);
            border-radius:8px;
            padding:38px 36px 32px;
            box-shadow:inset 0 0 40px rgba(0,0,0,0.45);
            overflow:hidden;
        }

        .board::before{
            content:"";
            position:absolute;
            inset:0;
            background-image:
                radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
                radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size:60px 60px, 37px 37px;
            background-position:0 0, 18px 22px;
            pointer-events:none;
        }

        .eyebrow{
            font-family:'JetBrains Mono', monospace;
            font-size:11px;
            letter-spacing:0.18em;
            text-transform:uppercase;
            color:var(--chalk-yellow);
            text-align:center;
            margin:0 0 6px;
            opacity:0.85;
        }

        h1{
            font-family:'Kalam', cursive;
            font-weight:700;
            font-size:clamp(24px, 4vw, 32px);
            text-align:center;
            color:var(--chalk);
            margin:0 0 6px;
            text-shadow:0 0 14px rgba(242,239,230,0.15);
        }

        .subtitle{
            text-align:center;
            color:var(--chalk-dim);
            font-size:13px;
            margin:0 0 28px;
        }

        .grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:0 18px;
        }

        .field{
            margin-bottom:18px;
            position:relative;
        }

        .field.full{
            grid-column:1 / -1;
        }

        label{
            display:block;
            font-family:'Kalam', cursive;
            font-size:15px;
            color:var(--chalk);
            margin-bottom:6px;
        }

        select, input{
            width:100%;
            padding:11px 12px;
            background:rgba(242,239,230,0.04);
            border:1.5px dashed rgba(242,239,230,0.35);
            border-radius:6px;
            color:var(--chalk);
            font-family:'Space Grotesk', sans-serif;
            font-size:14px;
            transition:border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            appearance:none;
            -webkit-appearance:none;
        }

        input::placeholder{ color:rgba(242,239,230,0.35); }

        select{
            background-image:linear-gradient(45deg, transparent 50%, var(--chalk-dim) 50%),
                              linear-gradient(135deg, var(--chalk-dim) 50%, transparent 50%);
            background-position:calc(100% - 18px) center, calc(100% - 13px) center;
            background-size:5px 5px, 5px 5px;
            background-repeat:no-repeat;
            cursor:pointer;
        }

        select option{
            background:var(--board-dark);
            color:var(--chalk);
        }

        input:focus, select:focus{
            outline:none;
            border-color:var(--chalk-yellow);
            background:rgba(232,196,104,0.06);
            box-shadow:0 0 0 3px rgba(232,196,104,0.12);
        }

        input:hover, select:hover{
            border-color:rgba(242,239,230,0.55);
        }

        button{
            width:100%;
            padding:14px;
            margin-top:8px;
            background:transparent;
            border:2px solid var(--chalk-yellow);
            border-radius:6px;
            color:var(--chalk-yellow);
            font-family:'Kalam', cursive;
            font-weight:700;
            font-size:17px;
            letter-spacing:0.02em;
            cursor:pointer;
            transition:background 0.2s ease, color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
        }

        button:hover{
            background:var(--chalk-yellow);
            color:var(--board-dark);
            box-shadow:0 0 22px rgba(232,196,104,0.35);
        }

        button:active{
            transform:scale(0.98);
        }

        .result{
            margin-top:26px;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:14px;
            padding-top:22px;
            border-top:1.5px dashed rgba(242,239,230,0.25);
            animation:chalk-in 0.5s ease-out both;
        }

        @keyframes chalk-in{
            from{ opacity:0; transform:translateY(8px); }
            to{ opacity:1; transform:translateY(0); }
        }

        .result-label{
            font-family:'Kalam', cursive;
            font-size:15px;
            color:var(--chalk-dim);
        }

        .result-score{
            font-family:'JetBrains Mono', monospace;
            font-weight:700;
            font-size:26px;
            color:var(--chalk-yellow);
        }

        @media (max-width:520px){
            .grid{ grid-template-columns:1fr; }
            .board{ padding:28px 20px 26px; }
        }

        button:focus-visible, select:focus-visible, input:focus-visible{
            outline:2px solid var(--chalk-yellow);
            outline-offset:2px;
        }
    </style>
</head>
<body>
<div class="frame">
    <div class="board">
        <p class="eyebrow">Math Score Estimator</p>
        <h1>Student Exam Performance Predictor</h1>
        <p class="subtitle">Fill in the details below — chalk it up, and we'll estimate the math score.</p>

        <form action="{{ url_for('predict_datapoint') }}" method="POST">
            <div class="grid">
                <div class="field">
                    <label for="gender">Gender</label>
                    <select name="gender" id="gender" required>
                        <option value="">Select gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="field">
                    <label for="ethnicity">Race / Ethnicity</label>
                    <select name="ethnicity" id="ethnicity" required>
                        <option value="">Select group</option>
                        <option value="group A">Group A</option>
                        <option value="group B">Group B</option>
                        <option value="group C">Group C</option>
                        <option value="group D">Group D</option>
                        <option value="group E">Group E</option>
                    </select>
                </div>

                <div class="field full">
                    <label for="parental_level_of_education">Parental Level of Education</label>
                    <select name="parental_level_of_education" id="parental_level_of_education" required>
                        <option value="">Select education</option>
                        <option value="some high school">Some High School</option>
                        <option value="high school">High School</option>
                        <option value="some college">Some College</option>
                        <option value="associate's degree">Associate's Degree</option>
                        <option value="bachelor's degree">Bachelor's Degree</option>
                        <option value="master's degree">Master's Degree</option>
                    </select>
                </div>

                <div class="field">
                    <label for="lunch">Lunch</label>
                    <select name="lunch" id="lunch" required>
                        <option value="">Select lunch type</option>
                        <option value="standard">Standard</option>
                        <option value="free/reduced">Free/Reduced</option>
                    </select>
                </div>

                <div class="field">
                    <label for="test_preparation_course">Test Preparation Course</label>
                    <select name="test_preparation_course" id="test_preparation_course" required>
                        <option value="">Select</option>
                        <option value="none">None</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>

                <div class="field">
                    <label for="reading_score">Reading Score</label>
                    <input type="number" name="reading_score" id="reading_score" min="0" max="100" placeholder="0–100" required>
                </div>

                <div class="field">
                    <label for="writing_score">Writing Score</label>
                    <input type="number" name="writing_score" id="writing_score" min="0" max="100" placeholder="0–100" required>
                </div>
            </div>

            <button type="submit">Predict Math Score</button>
        </form>

        {% if results %}
        <div class="result">
            <span class="result-label">Predicted score</span>
            <span class="result-score">{{ results }}</span>
        </div>
        {% endif %}
    </div>
</div>
</body>
</html>
